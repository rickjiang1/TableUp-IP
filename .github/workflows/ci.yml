name: CI

on:
  workflow_dispatch:

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: |
          node --check src/server.js
          node --check src/supabase.js
          node --check src/recipeMatching.js
          node --check src/schemas.js

  ios:
    name: iOS build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Debug
        run: xcodebuild -project ios/PantryPilot.xcodeproj -scheme PantryPilot -configuration Debug -destination 'generic/platform=iOS Simulator' build

      - name: Build Release
        run: xcodebuild -project ios/PantryPilot.xcodeproj -scheme PantryPilot -configuration Release -destination 'generic/platform=iOS Simulator' build

services:
  - type: web
    name: foodmanagementapp-dev
    runtime: node
    plan: free
    rootDir: backend
    branch: develop
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: dev
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGIN
        value: "*"

  - type: web
    name: foodmanagementapp
    runtime: node
    plan: free
    rootDir: backend
    branch: main
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: false
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: prod
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGIN
        value: "*"
